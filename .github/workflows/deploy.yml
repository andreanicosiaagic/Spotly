# ─────────────────────────────────────────────────────────────────────────────
# Spotly – CI/CD Pipeline
#
# SETUP ONCE (GitHub → Settings → Secrets and variables):
#
# ▸ Repository secrets:
#     AZURE_CREDENTIALS     JSON SP credentials:
#                           {"clientId":"…","clientSecret":"…",
#                            "subscriptionId":"…","tenantId":"…"}
#     AZURE_SUBSCRIPTION_ID Azure subscription ID
#     ENTRA_TENANT_ID       Azure AD tenant ID for the app
#     ENTRA_CLIENT_ID       App registration client ID (Spotly app roles)
#
# ▸ Environments (Settings → Environments):
#     development   – no protection rules  →  auto-deploys on push to dev
#       variable: ENVIRONMENT_NAME = black
#     staging       – add "Required reviewers" protection rule
#       variable: ENVIRONMENT_NAME = black-stg
#     production    – add "Required reviewers" protection rule
#       variable: ENVIRONMENT_NAME = black-prod
#
# SQL admin and managed identity access are configured automatically:
#   - The deploying Service Principal (from AZURE_CREDENTIALS) is set as SQL
#     Entra admin so colleagues can be added from the portal.
#   - After infra deploy the app's system-assigned managed identity receives
#     db_datareader / db_datawriter / db_ddladmin via az sql db query.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Spotly

on:
  push:
    branches: [dev]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        required: true
        options: [staging, production]

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          dotnet publish backend/Spotly.Api/Spotly.Api.csproj \
            -c Release -r linux-x64 --self-contained false \
            -o publish_out

      - name: Zip artifact
        run: cd publish_out && zip -r ../deploy.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: api-package
          path: deploy.zip
          retention-days: 3

  # ── Deploy – Development (auto on push to dev) ─────────────────────────────
  deploy-dev:
    name: Deploy → Development
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: api-package

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve SP identity for SQL admin
        id: sp
        run: |
          CLIENT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .clientId)
          OBJECT_ID=$(az ad sp show --id "$CLIENT_ID" --query id -o tsv)
          DISPLAY_NAME=$(az ad sp show --id "$CLIENT_ID" --query displayName -o tsv)
          echo "object_id=$OBJECT_ID"   >> $GITHUB_OUTPUT
          echo "display_name=$DISPLAY_NAME" >> $GITHUB_OUTPUT

      - name: Deploy infra
        id: infra
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          region: italynorth
          template: ./infra/main.bicep
          parameters: >-
            environmentName=${{ vars.ENVIRONMENT_NAME || 'black' }}
            entraTenantId=${{ secrets.ENTRA_TENANT_ID }}
            entraClientId=${{ secrets.ENTRA_CLIENT_ID }}
            sqlAdminLogin=${{ steps.sp.outputs.display_name }}
            sqlAdminObjectId=${{ steps.sp.outputs.object_id }}
            sqlAdminPrincipalType=Application

      - name: Grant SQL access to managed identity
        if: steps.infra.outputs.SQL_SERVER != ''
        env:
          APP_NAME: ${{ steps.infra.outputs.SERVICE_API_RESOURCE_NAME }}
          SQL_SERVER: ${{ steps.infra.outputs.SQL_SERVER }}
          SQL_DATABASE: ${{ steps.infra.outputs.SQL_DATABASE }}
        run: |
          LATEST=$(curl -fsSL https://api.github.com/repos/microsoft/go-sqlcmd/releases/latest | jq -r .tag_name)
          curl -fsSL "https://github.com/microsoft/go-sqlcmd/releases/download/${LATEST}/sqlcmd_linux_amd64.tar.gz" \
            | sudo tar xz -C /usr/local/bin sqlcmd

          cat > /tmp/grant.sql << EOF
          IF NOT EXISTS (SELECT * FROM sys.database_principals WHERE name = N'${APP_NAME}')
            EXEC('CREATE USER [${APP_NAME}] FROM EXTERNAL PROVIDER');
          IF NOT EXISTS (SELECT 1 FROM sys.database_role_members drm JOIN sys.database_principals r ON drm.role_principal_id=r.principal_id JOIN sys.database_principals m ON drm.member_principal_id=m.principal_id WHERE r.name='db_datareader' AND m.name=N'${APP_NAME}')
            EXEC('ALTER ROLE db_datareader ADD MEMBER [${APP_NAME}]');
          IF NOT EXISTS (SELECT 1 FROM sys.database_role_members drm JOIN sys.database_principals r ON drm.role_principal_id=r.principal_id JOIN sys.database_principals m ON drm.member_principal_id=m.principal_id WHERE r.name='db_datawriter' AND m.name=N'${APP_NAME}')
            EXEC('ALTER ROLE db_datawriter ADD MEMBER [${APP_NAME}]');
          IF NOT EXISTS (SELECT 1 FROM sys.database_role_members drm JOIN sys.database_principals r ON drm.role_principal_id=r.principal_id JOIN sys.database_principals m ON drm.member_principal_id=m.principal_id WHERE r.name='db_ddladmin' AND m.name=N'${APP_NAME}')
            EXEC('ALTER ROLE db_ddladmin ADD MEMBER [${APP_NAME}]');
          EOF

          sqlcmd \
            -S "${SQL_SERVER}.database.windows.net" \
            -d "${SQL_DATABASE}" \
            --authentication-method=ActiveDirectoryDefault \
            -i /tmp/grant.sql

          echo "SQL access granted to ${APP_NAME}"

      - name: Deploy app
        run: |
          az webapp deploy \
            --resource-group "${{ steps.infra.outputs.AZURE_RESOURCE_GROUP }}" \
            --name "${{ steps.infra.outputs.SERVICE_API_RESOURCE_NAME }}" \
            --src-path deploy.zip \
            --type zip

  # ── Deploy – Staging (manual, requires approval) ──────────────────────────
  deploy-staging:
    name: Deploy → Staging
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: api-package

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve SP identity for SQL admin
        id: sp
        run: |
          CLIENT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .clientId)
          OBJECT_ID=$(az ad sp show --id "$CLIENT_ID" --query id -o tsv)
          DISPLAY_NAME=$(az ad sp show --id "$CLIENT_ID" --query displayName -o tsv)
          echo "object_id=$OBJECT_ID"   >> $GITHUB_OUTPUT
          echo "display_name=$DISPLAY_NAME" >> $GITHUB_OUTPUT

      - name: Deploy infra
        id: infra
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          region: italynorth
          template: ./infra/main.bicep
          parameters: >-
            environmentName=${{ vars.ENVIRONMENT_NAME || 'black-stg' }}
            entraTenantId=${{ secrets.ENTRA_TENANT_ID }}
            entraClientId=${{ secrets.ENTRA_CLIENT_ID }}
            sqlAdminLogin=${{ steps.sp.outputs.display_name }}
            sqlAdminObjectId=${{ steps.sp.outputs.object_id }}
            sqlAdminPrincipalType=Application

      - name: Grant SQL access to managed identity
        if: steps.infra.outputs.SQL_SERVER != ''
        env:
          APP_NAME: ${{ steps.infra.outputs.SERVICE_API_RESOURCE_NAME }}
          SQL_SERVER: ${{ steps.infra.outputs.SQL_SERVER }}
          SQL_DATABASE: ${{ steps.infra.outputs.SQL_DATABASE }}
        run: |
          LATEST=$(curl -fsSL https://api.github.com/repos/microsoft/go-sqlcmd/releases/latest | jq -r .tag_name)
          curl -fsSL "https://github.com/microsoft/go-sqlcmd/releases/download/${LATEST}/sqlcmd_linux_amd64.tar.gz" \
            | sudo tar xz -C /usr/local/bin sqlcmd

          cat > /tmp/grant.sql << EOF
          IF NOT EXISTS (SELECT * FROM sys.database_principals WHERE name = N'${APP_NAME}')
            EXEC('CREATE USER [${APP_NAME}] FROM EXTERNAL PROVIDER');
          IF NOT EXISTS (SELECT 1 FROM sys.database_role_members drm JOIN sys.database_principals r ON drm.role_principal_id=r.principal_id JOIN sys.database_principals m ON drm.member_principal_id=m.principal_id WHERE r.name='db_datareader' AND m.name=N'${APP_NAME}')
            EXEC('ALTER ROLE db_datareader ADD MEMBER [${APP_NAME}]');
          IF NOT EXISTS (SELECT 1 FROM sys.database_role_members drm JOIN sys.database_principals r ON drm.role_principal_id=r.principal_id JOIN sys.database_principals m ON drm.member_principal_id=m.principal_id WHERE r.name='db_datawriter' AND m.name=N'${APP_NAME}')
            EXEC('ALTER ROLE db_datawriter ADD MEMBER [${APP_NAME}]');
          IF NOT EXISTS (SELECT 1 FROM sys.database_role_members drm JOIN sys.database_principals r ON drm.role_principal_id=r.principal_id JOIN sys.database_principals m ON drm.member_principal_id=m.principal_id WHERE r.name='db_ddladmin' AND m.name=N'${APP_NAME}')
            EXEC('ALTER ROLE db_ddladmin ADD MEMBER [${APP_NAME}]');
          EOF

          sqlcmd \
            -S "${SQL_SERVER}.database.windows.net" \
            -d "${SQL_DATABASE}" \
            --authentication-method=ActiveDirectoryDefault \
            -i /tmp/grant.sql

          echo "SQL access granted to ${APP_NAME}"

      - name: Deploy app
        run: |
          az webapp deploy \
            --resource-group "${{ steps.infra.outputs.AZURE_RESOURCE_GROUP }}" \
            --name "${{ steps.infra.outputs.SERVICE_API_RESOURCE_NAME }}" \
            --src-path deploy.zip \
            --type zip

  # ── Deploy – Production (manual, requires approval) ───────────────────────
  deploy-production:
    name: Deploy → Production
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: api-package

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve SP identity for SQL admin
        id: sp
        run: |
          CLIENT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .clientId)
          OBJECT_ID=$(az ad sp show --id "$CLIENT_ID" --query id -o tsv)
          DISPLAY_NAME=$(az ad sp show --id "$CLIENT_ID" --query displayName -o tsv)
          echo "object_id=$OBJECT_ID"   >> $GITHUB_OUTPUT
          echo "display_name=$DISPLAY_NAME" >> $GITHUB_OUTPUT

      - name: Deploy infra
        id: infra
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          region: italynorth
          template: ./infra/main.bicep
          parameters: >-
            environmentName=${{ vars.ENVIRONMENT_NAME || 'black-prod' }}
            entraTenantId=${{ secrets.ENTRA_TENANT_ID }}
            entraClientId=${{ secrets.ENTRA_CLIENT_ID }}
            sqlAdminLogin=${{ steps.sp.outputs.display_name }}
            sqlAdminObjectId=${{ steps.sp.outputs.object_id }}
            sqlAdminPrincipalType=Application

      - name: Grant SQL access to managed identity
        if: steps.infra.outputs.SQL_SERVER != ''
        env:
          APP_NAME: ${{ steps.infra.outputs.SERVICE_API_RESOURCE_NAME }}
          SQL_SERVER: ${{ steps.infra.outputs.SQL_SERVER }}
