name: spotly
metadata:
  template: spotly-poc@0.1.0
infra:
  provider: bicep
  path: infra
hooks:
  postprovision:
    posix:
      shell: sh
      run: ./scripts/grant-and-migrate.sh
    windows:
      shell: pwsh
      run: ./scripts/grant-and-migrate.ps1
services:
  api:
    project: ./backend/Spotly.Api
    language: dotnet
    host: appservice
